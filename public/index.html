<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSENA-SOAMANAMPY</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 700px;
      width: 100%;
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #0f172a;
    }
    p {
      line-height: 1.6;
      margin: 12px 0;
    }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .small {
      margin-top: 18px;
      color: #6b7280;
      font-size: 0.95rem;
    }
    button {
      margin-top: 18px;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Cloudflare Workers / D1</span>
    <h1>TSENA-SOAMANAMPY</h1>
    <p>Si cette page s’affiche, alors ton déploiement Cloudflare fonctionne déjà.</p>
    <p>Ensuite on ajoutera la sauvegarde et le chargement automatique avec D1.</p>
    <button onclick="alert('Le site marche !')">Tester</button>
    <div class="small">Fichier de test: public/index.html</div>
  </div>
</body>
</html>
