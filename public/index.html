<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOA MANAMPY SHOP - Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;width:100%;min-height:100vh}
    *{box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#eef2f7;color:#e9eef5;line-height:1.5}
    .header{background:#16202d;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    .header h1{font-size:18px;color:#eaf1fb;font-weight:700}
    .nav-btn{background:#2f6fed;color:#fff;border:none;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
    .nav-btn:hover{opacity:.9}
    .nav-links{display:flex;gap:6px;flex-wrap:wrap}
    .container{max-width:600px;margin:30px auto;padding:0 12px}
    .card{background:#16202d;border-radius:8px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.12);color:#eef4fb;text-align:center}
    .card h2{font-size:18px;margin-bottom:8px;color:#f2f6fb;font-weight:600}
    .card p{font-size:13px;color:#b8c4d4;margin-bottom:20px}
    .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    .menu-item{background:#1a2431;border:none;padding:18px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;color:#eef4fb;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s}
    .menu-item:hover{background:#2f6fed;transform:translateY(-2px)}
    .menu-item .icon{font-size:32px}
    .menu-item .label{font-size:12px}
    .btn-deconnexion{background:#dc3545;color:#fff;padding:7px 13px;border-radius:6px;text-decoration:none;font-weight:600;font-size:12px}
    .btn-deconnexion:hover{opacity:.9}
    @media (max-width: 768px) {
      .header{flex-direction:column;gap:10px;padding:10px}
      .nav-links{flex-wrap:wrap;justify-content:center}
      .nav-btn{font-size:11px;padding:6px 10px}
      .btn-deconnexion{font-size:11px;padding:6px 10px}
      .container{max-width:95%;margin:15px auto}
      .card{padding:15px}
      .menu-grid{grid-template-columns:1fr}
      .menu-item{padding:15px 10px}
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📺 SOA MANAMPY SHOP - Accueil</h1>
    <div class="nav-links">
      <a href="index.html" class="nav-btn">🏠 Accueil</a>
      <a href="abonnements.html" class="nav-btn">📝 Abonnements</a>
      <a href="stock.html" class="nav-btn">📦 Stock</a>
      <a href="saisie.html" class="nav-btn">✏️ Saisie</a>
      <a href="liste.html" class="nav-btn">📋 Liste</a>
      <a href="carte.html" class="nav-btn">🪪 Carte</a>
      <a href="commissions.html" class="nav-btn">💰 Commissions</a>
      <a href="déconnexion.html" class="btn-deconnexion">Déconnexion</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>👋 SOA MANAMPY SHOP</h2>
      <p>Sélectionne une option ci-dessous pour commencer</p>

      <div class="menu-grid">
        <a href="saisie.html" class="menu-item">
          <span class="icon">✏️</span>
          <span class="label">Saisie</span>
        </a>

        <a href="liste.html" class="menu-item">
          <span class="icon">📋</span>
          <span class="label">Voir Liste</span>
        </a>

        <a href="commissions.html" class="menu-item">
          <span class="icon">💰</span>
          <span class="label">Commissions</span>
        </a>

        <a href="stock.html" class="menu-item">
          <span class="icon">📦</span>
          <span class="label">Gérer Stock</span>
        </a>

        <a href="carte.html" class="menu-item">
          <span class="icon">🪪</span>
          <span class="label">Carte</span>
        </a>

        <a href="abonnements.html" class="menu-item">
          <span class="icon">📝</span>
          <span class="label">Abonnements</span>
        </a>

        <a href="loginina.html" class="menu-item">
          <span class="icon">🔐</span>
          <span class="label">Login</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
