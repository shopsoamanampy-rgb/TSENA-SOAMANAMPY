<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSENA-SOAMANAMPY</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; }
    .card { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
    input, select, textarea, button { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font: inherit; }
    textarea { min-height: 90px; grid-column: 1 / -1; }
    .full { grid-column: 1 / -1; }
    button { cursor: pointer; background: #0b5cff; color: white; border: none; }
    button:hover { background: #0847c2; }
    .status { margin-top: 14px; padding: 10px; border-radius: 8px; background: #eef6ff; }
    ul { padding-left: 18px; }
    .list { margin-top: 24px; }
    .op { padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; background: #fafafa; }
    .op small { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TSENA-SOAMANAMPY</h1>
    <p>Si cette page s’affiche, alors ton déploiement Cloudflare fonctionne déjà.</p>
    <p>Ensuite on ajoutera la sauvegarde et le chargement automatique avec D1.</p>

    <form id="opForm">
      <label>Type
        <input name="type" placeholder="Installation" />
      </label>

      <label>Date
        <input name="date" type="date" />
      </label>

      <label>Heure
        <input name="heure" type="time" />
      </label>

      <label>Nom
        <input name="nom" placeholder="Rakoto" />
      </label>

      <label>Prénom
        <input name="prenom" placeholder="Jean" />
      </label>

      <label>Contact
        <input name="contact" placeholder="034..." />
      </label>

      <label>Adresse
        <input name="adresse" placeholder="Antananarivo" />
      </label>

      <label>Source
        <input name="source" placeholder="Magasin" />
      </label>

      <label>Statut
        <select name="statut">
          <option>En attente</option>
          <option>Validé</option>
          <option>Annulé</option>
        </select>
      </label>

      <label>Num carte
        <input name="numCarte" />
      </label>

      <label>Num décodeur
        <input name="numDecodeur" />
      </label>

      <label>Bouquet
        <input name="bouquet" />
      </label>

      <label>Montant
        <input name="montant" type="number" step="0.01" />
      </label>

      <label>Commission toi
        <input name="commissionToi" type="number" step="0.01" value="0" />
      </label>

      <label>Commission source
        <input name="commissionSource" type="number" step="0.01" value="0" />
      </label>

      <label>Commission tech
        <input name="commissionTech" type="number" step="0.01" value="0" />
      </label>

      <label class="full">Commentaire
        <textarea name="commentaire" placeholder="Notes..."></textarea>
      </label>

      <button class="full" type="submit">Enregistrer</button>
    </form>

    <div id="status" class="status">Prêt.</div>

    <div class="list">
      <h2>Opérations</h2>
      <div id="ops"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('opForm');
    const statusBox = document.getElementById('status');
    const opsBox = document.getElementById('ops');

    function setStatus(msg) {
      statusBox.textContent = msg;
    }

    async function loadOps() {
      const res = await fetch('/api/operations');
      const json = await res.json();
      const items = json.data || [];
      if (!items.length) {
        opsBox.innerHTML = '<p>Aucune opération.</p>';
        return;
      }
      opsBox.innerHTML = items.map(op => `
        <div class="op">
          <strong>${op.type || ''}</strong> — ${op.nom || ''} ${op.prenom || ''}<br>
          <small>${op.date || ''} ${op.heure || ''} | ${op.statut || ''}</small><br>
          <small>${op.contact || ''} | ${op.adresse || ''}</small>
        </div>
      `).join('');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      data.spOk = 0;
      const res = await fetch('/api/operations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      if (json.ok) {
        setStatus('Enregistré avec succès.');
        form.reset();
        await loadOps();
      } else {
        setStatus('Erreur: ' + (json.error || 'inconnue'));
      }
    });

    loadOps().catch(() => setStatus('Impossible de charger les opérations.'));
  </script>
</body>
</html>
